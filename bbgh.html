<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    /* ── CHUẨN IN A4 Bản Quyền Nguyễn Sinh Tuấn───────────────────────────────────────── */
    @page { 
      size: A4; 
      margin: 10mm 12mm; 
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 11pt;
      line-height: 1.4;
      margin: 0; padding: 0;
      background: #fff; color: #000;
    }

    .page { 
      width: 185mm; 
      margin: auto; 
      padding: 5mm 0; 
    }

    /* ── HEADER LOGO + MÃ TÀI LIỆU ────────────────────────── */
    .doc-code-top {
      font-size: 9pt;
      font-family: "Courier New", monospace;
      text-align: right;
      margin-bottom: 4px;
    }

    .header-table {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #000;
      margin-bottom: 12px;
    }

    .header-table td {
      border: none;
      vertical-align: middle;
      padding: 8px;
    }

    .header-logo-cell {
      width: 28%;
      border-right: 1.5px solid #000 !important;
      text-align: center;
    }

    .logo-img {
      width: 100%;
      max-height: 55px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .company-info { 
      font-size: 9pt; 
      line-height: 1.5; 
    }
    
    .company-info b { 
      font-size: 10pt; 
      text-transform: uppercase; 
    }

    /* ── TIÊU ĐỀ ────────────────────────────────────────────── */
    .title-area { 
      margin: 10px 0 16px; 
    }
    
    .title-area h1 {
      font-size: 18pt; 
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 6px;
      text-align: center;
    }
    
    .title-area .sub {
      font-style: italic; 
      font-size: 10.5pt; 
      margin: 2px 0;
      text-align: right;
    }
    
    .title-area .so-phieu {
      font-weight: bold; 
      font-size: 11.5pt; 
      margin: 4px 0 0;
      text-align: right;
    }

    /* ── THÔNG TIN CÁC BÊN ─────────────────────────────────── */
    .party { 
      margin-bottom: 10px; 
      font-size: 11pt; 
    }
    
    .party-title {
      font-weight: bold; 
      text-transform: uppercase;
      font-size: 11pt; 
      margin-bottom: 4px;
    }

    .party-table-info {
      width: 100%;
      border-collapse: collapse;
      margin-left: 8px;
    }

    .party-table-info td {
      padding: 2px 4px;
      vertical-align: bottom;
      border: none;
    }

    .label-col {
      white-space: nowrap;
      width: 75px;
    }

    .value-col {
      border-bottom: 1px dotted #444;
      padding-left: 4px;
    }

    /* ── BẢNG CHI TIẾT VẬT TƯ ──────────────────────────────── */
    .intro-text { 
      margin: 12px 0 6px; 
      font-size: 11pt; 
    }

    table.main-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      margin-top: 5px;
    }
    
    table.main-table th,
    table.main-table td {
      border: 1px solid #000;
      padding: 6px 4px;
      text-align: center;
      vertical-align: middle;
    }
    
    table.main-table th {
      background: #e8e8e8;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 9.5pt;
      line-height: 1.3;
    }
    
    table.main-table td.left { 
      text-align: left; 
      padding-left: 6px; 
    }
    
    table.main-table tr.total-row td { 
      font-weight: bold; 
      background: #f2f2f2;
    }

    /* ── GHI CHÚ ────────────────────────────────────────────── */
    .note-area { 
      margin-top: 8px; 
      font-size: 10.5pt; 
      line-height: 1.5;
    }
    .note-area .italic { font-style: italic; }
    .note-area .bold { font-weight: bold; }

    /* ── BẢNG KÝ TÊN ────────────────────────────────────────── */
    table.sign-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      table-layout: fixed;
    }
    
    table.sign-table td {
      border: none;
      text-align: center;
      vertical-align: top;
      padding: 4px 2px;
      font-size: 9.5pt;
    }
    
    .sign-title { 
      font-weight: bold; 
      text-transform: uppercase; 
      line-height: 1.3; 
    }
    
    .sign-sub { 
      font-style: italic; 
      font-size: 8.5pt; 
      color: #333;
    }
    
    .sign-space { 
      height: 60px; 
    }
    
    .sign-name { 
      font-weight: bold; 
      font-size: 10pt; 
      min-height: 18px; 
    }

    /* ── NÚT IN DI ĐỘNG / ĐIỀU KHIỂN ────────────────────────── */
    @media print {
      .no-print { display: none !important; }
      body { margin: 0; background: #fff; }
      table.main-table th { background: #e8e8e8 !important; }
      table.main-table tr.total-row td { background: #f2f2f2 !important; }
    }
    
    .btn-print {
      position: fixed; top: 16px; right: 16px; z-index: 999;
      padding: 10px 22px;
      background: #1b5e20; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; font-weight: bold; font-size: 13px;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .btn-print:hover { background: #2e7d32; }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading {
      text-align: center; margin-top: 120px;
      font-style: italic; font-size: 13pt; color: #555;
    }
  </style>
</head>
<body>

  <button class="btn-print no-print" onclick="window.print()">🖨️ In Biên Bản</button>

  <div class="page">
    <div id="content">
      <div class="loading">⏳ Đang tải dữ liệu biên bản giao nhận hàng...</div>
    </div>
  </div>

  <script>
    const idPhieu = "<?= idPhieu ?>";

    window.onload = function () {
      google.script.run
        .withSuccessHandler(renderBBGH)
        .withFailureHandler(function(err) {
          document.getElementById('content').innerHTML =
            '<h3 style="color:red; text-align:center;">❌ Lỗi kết nối: ' + err.message + '</h3>';
        })
        .getDuLieuBBGH(idPhieu);
    };

    function renderBBGH(data) {
      if (data.error) {
        document.getElementById('content').innerHTML =
          '<h3 style="color:red; text-align:center;">❌ ' + data.error + '</h3>';
        return;
      }

      const { thongTinChung: tc, chiTietVatTu } = data;

      /* ── LOGIC TÍNH TOÁN ĐỂ GỘP DÒNG (ROWSPAN) CHÍNH XÁC CHO LSX & GHI CHÚ ── */
      let rowsHtml = "";

      for (let i = 0; i < chiTietVatTu.length; i++) {
        let item = chiTietVatTu[i];
        
        // Kiểm tra xem dòng hiện tại có phải là dòng đầu tiên của cụm LSX hay không
        let isFirstInGroup = (i === 0 || chiTietVatTu[i].lsx !== chiTietVatTu[i - 1].lsx);
        
        let rowspanAttr = "";
        if (isFirstInGroup) {
          // Đếm xem cụm LSX này kéo dài bao nhiêu dòng liên tiếp
          let matchCount = 0;
          for (let j = i; j < chiTietVatTu.length; j++) {
            if (chiTietVatTu[j].lsx === item.lsx) {
              matchCount++;
            } else {
              break;
            }
          }
          if (matchCount > 1) {
            rowspanAttr = `rowspan="${matchCount}"`;
          }
        }

        // Tạo cấu trúc dòng TR cho HTML
        rowsHtml += `<tr>`;
        
        // 1. Cột STT: Luôn hiển thị tăng dần ở mọi dòng, KHÔNG gộp dòng
        rowsHtml += `<td>${i + 1}</td>`;
        
        // 2. Cột LSX-ĐH: Chỉ tạo ô gộp lớn ở dòng đầu tiên của cụm trùng nhau
        if (isFirstInGroup) {
          rowsHtml += `<td ${rowspanAttr} style="font-weight: bold;">${item.lsx || ''}</td>`;
        }

        // 3. Các cột chi tiết riêng lẻ từng vật tư: Luôn xuất hiện bình thường ở mỗi dòng
        rowsHtml += `
          <td>${item.po || ''}</td>
          <td>${item.maSP || ''}</td>
          <td class="left">${item.tenSP || ''}</td>
          <td>${item.dvt || ''}</td>
          <td>${item.soLuong || ''}</td>
        `;

        // 4. Cột Ghi chú: Gộp chung ô lớn tương ứng theo cụm LSX ở cuối hàng
        if (isFirstInGroup) {
          rowsHtml += `
            <td ${rowspanAttr} class="left" style="font-style: italic; font-size: 9.5pt; max-width: 140px; word-wrap: break-word;">
              ${item.ghiChu || ''}
            </td>
          `;
        }

        rowsHtml += `</tr>`;
      }

      const html = `
        <div class="doc-code-top">QT.TOMC.TKVT/06-BM01</div>
        <table class="header-table">
          <tr>
            <td class="header-logo-cell">
              <img class="logo-img"
                src="https://thacoindustries.com/wp-content/uploads/2023/08/LOGO_24-7-2023-01.png"
                alt="THACO INDUSTRIES">
            </td>
            <td>
              <div class="company-info">
                <b>CÔNG TY TNHH TỔ HỢP CƠ KHÍ THACO</b><br>
                Địa Chỉ: KCN Cơ khí Ô tô Chu Lai Trường Hải - Xã Núi Thành - TP. Đà Nẵng<br>
                Điện Thoại: 02353.565.327 &nbsp;&nbsp; MST: 4001264725
              </div>
            </td>
          </tr>
        </table>

        <div class="title-area">
          <h1>Biên Bản Giao Nhận Hàng</h1>
          <div class="sub">Chu Lai, ngày ${tc.ngayLap || '........'}</div>
          <div class="so-phieu">SỐ: ${tc.soPhieu || ''}</div>
        </div>

        <div class="party">
          <div class="party-title">A. Bên giao: CÔNG TY TNHH TỔ HỢP CƠ KHÍ THACO</div>
          <table class="party-table-info">
            <tr>
              <td class="label-col">Địa chỉ:</td>
              <td class="value-col">KCN Cơ khí Ô tô Chu Lai Trường Hải - Xã Núi Thành - TP. Đà Nẵng</td>
            </tr>
          </table>
          <table class="party-table-info" style="width: 100%;">
            <tr>
              <td class="label-col" style="width: 75px;">Đại diện:</td>
              <td class="value-col" style="width: 45%;"></td>
              <td class="label-col" style="width: 75px; padding-left: 15px;">Điện thoại:</td>
              <td class="value-col"></td>
            </tr>
          </table>
        </div>

        <div class="party">
          <div class="party-title">B. Bên nhận: ${tc.kho || '........................................'}</div>
          <table class="party-table-info">
            <tr>
              <td class="label-col">Địa chỉ:</td>
              <td class="value-col">${tc.diaChi || ''}</td>
            </tr>
          </table>
          <table class="party-table-info">
            <tr>
              <td class="label-col" style="width: 75px;">Đại diện:</td>
              <td class="value-col" style="width: 45%;"></td>
              <td class="label-col" style="width: 75px; padding-left: 15px;">Điện thoại:</td>
              <td class="value-col"></td>
            </tr>
          </table>
        </div>

        <div class="party">
          <div class="party-title">C. Bên vận chuyển:</div>
          <table class="party-table-info">
            <tr>
              <td class="label-col" style="width: 75px;">Tên tài xế:</td>
              <td class="value-col" style="width: 45%;"></td>
              <td class="label-col" style="width: 75px; padding-left: 15px;">Điện thoại:</td>
              <td class="value-col"></td>
            </tr>
            <tr>
              <td class="label-col">BSX:</td>
              <td class="value-col" colspan="3"></td>
            </tr>
          </table>
        </div>

        <div class="intro-text">Các bên tiến hành giao nhận hàng hóa với nội dung sau:</div>

        <table class="main-table">
          <thead>
            <tr>
              <th style="width:5%">STT</th>
              <th style="width:14%">LSX-ĐH</th>
              <th style="width:13%">Số PO</th>
              <th style="width:12%">Mã SP</th>
              <th style="width:28%">Tên Chi Tiết</th>
              <th style="width:8%">ĐVT</th>
              <th style="width:10%">Số lượng</th>
              <th style="width:10%">Ghi chú</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
            <tr class="total-row">
              <td colspan="6">Tổng cộng</td>
              <td>${tc.tongSL || ''}</td>
              <td></td>
            </tr>
          </tbody>
        </table>

        <div class="note-area">
          <div class="italic">Hàng khô ráo, đúng quy cách</div>
          <div><span class="bold">Ghi chú:</span>
            <span class="italic"> - Biên bản này được lập 03 bản, có giá trị pháp lý như nhau, mỗi bên giữ 01 bản</span>
          </div>
        </div>

        <table class="sign-table">
          <tr>
            <td><div class="sign-title">Bên Giao</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">P. Chất Lượng</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">PT. Bộ Phận</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">Bảo Vệ</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">Bên Vận Chuyển</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">Bên Nhận</div><div class="sign-sub">(Ký, họ tên)</div></td>
            <td><div class="sign-title">Người Lập</div><div class="sign-sub">(Ký, họ tên)</div></td>
          </tr>
          <tr>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
            <td class="sign-space"></td>
          </tr>
          <tr>
            <td class="sign-name"></td>
            <td class="sign-name"></td>
            <td class="sign-name"></td>
            <td class="sign-name"></td>
            <td class="sign-name"></td>
            <td class="sign-name"></td>
            <td class="sign-name">${tc.nguoiTao || ''}</td>
          </tr>
        </table>
      `;

      document.getElementById('content').innerHTML = html;
    }
  </script>
</body>
</html>
